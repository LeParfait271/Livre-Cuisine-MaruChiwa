  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Cook Note",
      "description": "Livre de cuisine de MaruChiwa",
      "url": "https://1c1996d6.cook-note.pages.dev/"
    }
  </script>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="/assets/cook-note.png" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/cook-note.png" />

  <!-- Fonts — préchargées pour éviter le FOUT -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Metal+Mania&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />

  <!-- React 18 production -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Confetti + QR code -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
</head>
<body>
  <!-- Écran de chargement — caché par React au montage (voir app.js) -->
  <div id="loading-screen" aria-hidden="true" style="
    position:fixed; inset:0; background:#000;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'Inter',system-ui,sans-serif; color:#fbbf24; z-index:99999;
  ">
    <img src="/assets/cook-note.png" alt="Cook Note" style="width:min(420px,78vw); margin-bottom:22px;" />
    <div style="width:180px; height:3px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden;">
      <div style="height:100%; background:linear-gradient(90deg,#fbbf24,#f59e0b);
        animation:lsBar 1.8s ease-in-out forwards; border-radius:2px; width:0;"></div>
    </div>
  </div>

  <style>
    @keyframes lsBar    { from { width:0 } to { width:100% } }
    @keyframes lsBounce { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-8px) } }
  </style>

  <div id="root"></div>

  <!-- recipes.js DOIT être chargé AVANT app.js -->
  <script src="recipes.js"></script>

  <!-- App React sans transpilation côté navigateur -->
  <script src="app.js"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
    // Cacher l'écran de chargement dès que React est monté.
    window.__cookNoteReady = () => {
      const ls = document.getElementById('loading-screen');
      if (ls) {
        ls.style.transition = 'opacity 0.4s ease';
        ls.style.opacity = '0';
        setTimeout(() => ls.remove(), 420);
      }
    };
    // Fallback : si React ne monte pas dans 8s, on retire l'écran de chargement
    // pour ne pas rester bloqué indéfiniment (erreur JS, réseau lent, etc.)
    setTimeout(() => {
      const ls = document.getElementById('loading-screen');
      if (ls) {
        ls.style.transition = 'opacity 0.6s ease';
        ls.style.opacity = '0';
        setTimeout(() => {
          if (ls.parentNode) {
            ls.innerHTML = '<div style="color:#ef4444;font-family:Inter,sans-serif;text-align:center;padding:20px"><p style="font-size:18px;font-weight:700">⚠️ Erreur de chargement</p><p style="font-size:13px;opacity:.7;margin-top:8px">Ouvrez la console (F12) pour voir le détail.</p><button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#fbbf24;border:none;border-radius:8px;cursor:pointer;font-weight:700">↺ Recharger</button></div>';
            ls.style.opacity = '1';
            ls.style.background = '#111';
          }
        }, 650);
      }
    }, 8000);
  </script>
</body>
</html>
