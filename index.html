<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Le Grimoire Culinaire de MaruChiwa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- SEO -->
  <meta name="description" content="Le Grimoire Culinaire de MaruChiwa — recettes organisées, modernes, avec recherche avancée, favoris et mode sombre." />
  <meta name="author" content="MaruChiwa" />
  <meta name="theme-color" content="#fbbf24" />

  <!-- Open Graph -->
  <meta property="og:title"       content="Le Grimoire Culinaire de MaruChiwa" />
  <meta property="og:description" content="Recettes organisées, modernes, avec recherche avancée, favoris et mode sombre." />
  <meta property="og:type"        content="website" />
  <meta property="og:image"       content="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1200&q=80" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon"     href="favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="favicon.png" />

  <!-- Fonts — préchargées pour éviter le FOUT -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />

  <!-- React 18 production (plus léger que development) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel standalone — compile JSX côté navigateur.
       Pour un usage local/NUC c'est acceptable.
       Pour un hébergement public, pré-compiler avec Vite. -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
  <!-- Écran de chargement — caché par React au montage (voir app.js) -->
  <div id="loading-screen" aria-hidden="true" style="
    position:fixed; inset:0; background:#000;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'Inter',system-ui,sans-serif; color:#fbbf24; z-index:99999;
  ">
    <div style="font-size:56px; margin-bottom:18px; animation:lsBounce 1s ease-in-out infinite">📖</div>
    <div style="font-size:22px; font-weight:800; letter-spacing:-0.5px; margin-bottom:6px;">
      Le Grimoire Culinaire
    </div>
    <div style="font-size:14px; color:rgba(255,255,255,.45); margin-bottom:32px;">de MaruChiwa</div>
    <div style="width:180px; height:3px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden;">
      <div style="height:100%; background:linear-gradient(90deg,#fbbf24,#f59e0b);
        animation:lsBar 1.8s ease-in-out forwards; border-radius:2px; width:0;"></div>
    </div>
  </div>

  <style>
    @keyframes lsBar    { from { width:0 } to { width:100% } }
    @keyframes lsBounce { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-8px) } }
  </style>

  <div id="root"></div>

  <!-- recipes.js DOIT être chargé AVANT app.js -->
  <script src="recipes.js"></script>

  <!-- App React (Babel transpile à la volée) -->
  <script type="text/babel" src="app.js" data-presets="react"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
    // Cacher l'écran de chargement dès que React est monté
    // app.js appelle window.__gremoireReady() après ReactDOM.createRoot
    window.__gremoireReady = () => {
      const ls = document.getElementById('loading-screen');
      if (ls) {
        ls.style.transition = 'opacity 0.4s ease';
        ls.style.opacity = '0';
        setTimeout(() => ls.remove(), 420);
      }
    };
  </script>
</body>
</html>
